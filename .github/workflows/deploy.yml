name: Deploy AgroVerde One-Page

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_DIR: /opt/agroverde-onepage
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}
  EC2_PORT: ${{ secrets.EC2_PORT }}
  EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

jobs:
  deploy:
    name: Build and deploy on EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate project files
        run: |
          test -f index.html
          test -f Dockerfile
          grep -q 'const INSTANCE_LABEL = "web-srv-01"' index.html

      - name: Configure SSH
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_SSH_KEY"
          EC2_HOST="$(printf '%s' "$EC2_HOST" | tr -d '[:space:]')"
          echo "EC2_HOST=$EC2_HOST" >> "$GITHUB_ENV"
          echo "EC2_USER=${EC2_USER:-ubuntu}" >> "$GITHUB_ENV"
          echo "EC2_PORT=${EC2_PORT:-22}" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s" "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "${EC2_PORT:-22}" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Package application
        run: |
          tar --exclude='.git' \
              --exclude='.github' \
              --exclude='docs' \
              --exclude='11.0_ProjetoCloud_OnePage.md' \
              --exclude='evidencias' \
              -czf "$RUNNER_TEMP/agroverde-onepage.tar.gz" .
          echo "PACKAGE_PATH=$RUNNER_TEMP/agroverde-onepage.tar.gz" >> "$GITHUB_ENV"

      - name: Upload application to EC2
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "sudo mkdir -p $APP_DIR && sudo chown $EC2_USER:$EC2_USER $APP_DIR"
          scp -i ~/.ssh/ec2_key -P "$EC2_PORT" "$PACKAGE_PATH" "$EC2_USER@$EC2_HOST:$APP_DIR/agroverde-onepage.tar.gz"
